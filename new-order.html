<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faster - New Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        /* Strict WebView Fixes */
        html, body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin: 0; 
            background-color: #f3f4f6; 
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .chat-bg { 
            background-color: #e5ddd5; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-attachment: fixed;
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            scroll-behavior: smooth;
        }

        #attachMenu { 
            position: fixed; 
            bottom: 75px; 
            left: 16px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            padding: 20px; 
            width: 280px; 
            z-index: 9999; 
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: scale(0);
            transform-origin: bottom left; 
            opacity: 0; 
            pointer-events: none;
        }

        #attachMenu.active { 
            transform: scale(1); 
            opacity: 1; 
            pointer-events: auto; 
        }

        .bubble { 
            max-width: 82%; 
            padding: 8px 10px; 
            border-radius: 12px; 
            font-size: 14.5px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            word-wrap: break-word; 
            position: relative; 
            transition: all 0.2s ease; 
            user-select: none; 
            -webkit-user-select: none;
            line-height: 1.4;
        }

        .customer-bubble { 
            align-self: flex-end; 
            background-color: #dcf8c6; 
            border-top-right-radius: 4px; 
        }
        
        .bubble-selected { 
            background-color: #bceb9e !important; 
            transform: scale(0.96); 
            border: 2px solid #008069; 
            box-shadow: 0 4px 10px rgba(0,128,105,0.2); 
            opacity: 0.9;
        }

        .bubble-selected::after {
            content: '\f058'; 
            font-family: 'Font Awesome 6 Free'; 
            font-weight: 900;
            position: absolute; 
            right: -8px; 
            bottom: -8px; 
            color: #008069; 
            background: white; 
            border-radius: 50%;
            font-size: 16px; 
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .media-thumb { 
            width: 100%; 
            max-width: 110px; /* FIX: 140px se kam kar ke 110px kar diya */
            max-height: 110px; /* FIX: 140px se kam kar ke 110px kar diya */
            border-radius: 12px; 
            pointer-events: none; 
            object-fit: cover; 
            background-color: rgba(0,0,0,0.05); 
        }

        .caption-text { 
            font-size: 13px; 
            color: #1f2937; 
            margin-top: 6px; 
            padding-top: 4px; 
            border-top: 1px solid rgba(0,0,0,0.05); 
        }
        
        .animate-pop { animation: pop 0.2s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .voice-active { background-color: #ef4444 !important; animation: pulse-shadow 1.5s infinite; }
        @keyframes pulse-shadow { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .capture-btn {
            width: 70px; height: 70px; border: 6px solid rgba(255,255,255,0.3);
            background: white; border-radius: 50%; position: relative;
        }
        .capture-btn::after { content: ''; position: absolute; inset: 4px; border: 2px solid #000; border-radius: 50%; }

        textarea::-webkit-scrollbar { display: none; }
        #offlineBanner { transition: top 0.3s ease-in-out; }
        /* FIX: Mobile Footer Safe Area Padding */
        .pb-safe { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <audio id="notifSound" src="https://hfaghazbwdbjurachzzq.supabase.co/storage/v1/object/public/order-files/rigtone.mp3" preload="auto"></audio>

    <div id="offlineBanner" class="fixed top-[-50px] left-0 w-full bg-red-500 text-white text-center text-[10px] uppercase tracking-widest py-2 z-[60] font-black shadow-md">
        <i class="fas fa-wifi-slash mr-2"></i> No Internet Connection
    </div>

    <div id="customModal" class="fixed inset-0 bg-black/60 z-[100000] hidden items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform transition-all scale-95 opacity-0" id="modalBox">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 mb-1"></h3>
            <p id="modalText" class="text-sm text-gray-600 mb-4 leading-relaxed"></p>
            <input type="text" id="modalInput" class="hidden w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-orange-500 mb-4 bg-gray-50">
            <div class="flex justify-end gap-3 mt-2" id="modalButtons"></div>
        </div>
    </div>

    <header id="selectionHeader" class="hidden bg-[#008069] p-4 text-white flex items-center shadow-md shrink-0 z-50 transition-all duration-300">
        <div class="flex items-center">
            <i class="fas fa-arrow-left mr-5 cursor-pointer text-xl active:scale-90" onclick="cancelSelection()"></i>
            <span id="selectionCount" class="font-bold text-lg">1</span>
        </div>
        <div class="ml-auto flex items-center gap-6">
            <i id="editIcon" class="fas fa-reply cursor-pointer text-xl active:scale-90 transition-transform" onclick="editSelected()"></i>
            <i class="fas fa-trash cursor-pointer text-xl active:scale-90 transition-transform" onclick="confirmDelete()"></i>
        </div>
    </header>

    <div id="customerDetailsBox" class="bg-gradient-to-r from-blue-50 to-indigo-50 px-4 py-1.5 shadow-sm flex flex-col gap-0.5 shrink-0 border-b border-blue-100 z-40 relative">
        <div class="flex justify-between items-center">
            <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Delivery Details</span>
            <button onclick="location.href='profile.html'" class="text-[8px] font-black text-blue-600 bg-white px-2 py-0.5 rounded-full shadow-sm border border-blue-100 active:scale-90 transition-transform"><i class="fas fa-pen"></i> Edit</button>
        </div>
        <div class="relative">
            <input type="text" id="editName" class="w-full bg-transparent outline-none font-bold text-blue-900 border-b border-blue-200 pb-0.5 text-xs pr-6" readonly>
            <i class="fas fa-user absolute right-1 top-0 text-blue-400 text-[10px]"></i>
        </div>
        <div class="relative">
            <input type="text" id="editAddress" class="w-full bg-transparent outline-none font-bold text-blue-900 text-[11px] pr-6 truncate" readonly>
            <i class="fas fa-map-marker-alt absolute right-1 top-0.5 text-blue-400 text-[10px]"></i>
        </div>
    </div>

    <div id="chatArea" class="chat-bg relative">
        <div id="emptyPlaceholder" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
            <span class="text-lg font-black uppercase tracking-[0.3em] text-gray-500">( Empty )</span>
        </div>
    </div>

    <div id="confirmBtnRow" class="hidden px-4 py-2 bg-white border-t shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40">
        <button onclick="handleConfirmPrompt()" id="finalSubmitBtn" class="w-full bg-orange-600 active:bg-orange-700 text-white font-bold py-2.5 rounded-xl shadow-lg uppercase text-sm tracking-wide flex items-center justify-center gap-2 transition-colors">
            Confirm order <i class="fas fa-question-circle text-red-500 bg-white rounded-full text-lg border border-white"></i>
        </button>
    </div>

    <footer class="bg-white p-2.5 pb-safe flex items-end gap-2 shrink-0 border-t z-50">
        <button onclick="toggleAttachMenu()" id="plusBtn" class="w-11 h-11 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 shadow-sm shrink-0 active:bg-gray-200 transition-colors">
            <i class="fas fa-plus transition-transform duration-300 text-lg" id="plusIcon"></i>
        </button>
        
        <div id="textInputWrapper" class="flex-1 bg-gray-100 rounded-3xl flex items-center px-4 border border-gray-200 shadow-inner">
            <textarea id="orderInput" oninput="handleInput(this)" placeholder="Type details..." rows="1" class="w-full bg-transparent py-3 outline-none text-sm resize-none max-h-32 text-gray-800"></textarea>
        </div>

        <div id="recordingTimerUI" class="hidden flex-1 bg-red-50 rounded-3xl flex items-center justify-center px-4 border border-red-200 shadow-inner h-11 text-red-500 gap-2">
            <i class="fas fa-circle text-[8px] animate-pulse"></i>
            <span class="font-bold text-sm tracking-wider w-12 text-center" id="recordTimer">00:00</span>
        </div>

        <button id="sendBtn" onclick="addToDraft('text')" class="hidden w-11 h-11 bg-orange-500 text-white rounded-full flex items-center justify-center shadow-md shrink-0 active:scale-95 transition-transform">
            <i class="fas fa-paper-plane text-sm ml-0.5"></i>
        </button>
        <button id="voiceBtn" onclick="handleVoice()" class="w-11 h-11 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-md shrink-0 active:scale-95 transition-transform">
            <i class="fas fa-microphone" id="micIcon"></i>
        </button>
    </footer>

    <div id="attachMenu">
        <div class="grid grid-cols-3 gap-6">
            <div onclick="startCustomCamera()" class="flex flex-col items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-gradient-to-tr from-pink-500 to-rose-400 rounded-full flex items-center justify-center text-white text-xl shadow-lg"><i class="fas fa-camera"></i></div>
                <span class="text-[10px] font-bold text-gray-600">Camera</span>
            </div>
            <div onclick="document.getElementById('galleryInput').click(); toggleAttachMenu();" class="flex flex-col items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-400 rounded-full flex items-center justify-center text-white text-xl shadow-lg"><i class="fas fa-image"></i></div>
                <span class="text-[10px] font-bold text-gray-600">Gallery</span>
            </div>
            <div onclick="document.getElementById('docInput').click(); toggleAttachMenu();" class="flex flex-col items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-gradient-to-tr from-gray-700 to-slate-500 rounded-full flex items-center justify-center text-white text-xl shadow-lg"><i class="fas fa-file-lines"></i></div>
                <span class="text-[10px] font-bold text-gray-600">Docs</span>
            </div>
        </div>
    </div>

    <div id="customCamOverlay" class="fixed inset-0 bg-black z-[10000] hidden flex-col">
        <div class="flex justify-between p-6 absolute top-0 w-full z-20">
            <button onclick="stopCustomCamera()" class="text-white text-3xl"><i class="fas fa-xmark"></i></button>
            <div id="camTimerDisplay" class="hidden text-white font-bold bg-red-600 px-5 py-1.5 rounded-full text-xs animate-pulse">00:00</div>
            <button onclick="switchCamera()" class="text-white text-2xl"><i class="fas fa-arrows-rotate"></i></button>
        </div>
        <video id="v" class="w-full flex-1 object-cover" autoplay playsinline muted></video>
        <div class="absolute bottom-12 w-full flex flex-col items-center gap-8 z-20">
            <div class="flex gap-12 text-gray-400 text-[11px] font-black tracking-[0.2em]">
                <span id="pTab" onclick="setMode('photo')" class="text-white border-b-2 border-white pb-1">PHOTO</span>
                <span id="vTab" onclick="setMode('video')" class="pb-1">VIDEO</span>
            </div>
            <button id="camBtn" onclick="handleCapture()" class="capture-btn active:scale-90 transition-transform"></button>
        </div>
        <canvas id="c" class="hidden"></canvas>
    </div>

    <input type="file" id="galleryInput" class="hidden" accept="image/*,video/*" multiple onchange="previewFile(this, 'media')">
    <input type="file" id="docInput" class="hidden" accept=".pdf,.doc,.docx,.txt,.rtf,.dot,.xls,.xlsx,.ppt,.pptx,.zip,.apk,.csv" multiple onchange="previewFile(this, 'doc')">

    <div id="fullView" class="fixed inset-0 bg-black/95 z-[10000] hidden items-center justify-center backdrop-blur-sm" onclick="this.style.display='none'">
        <div id="fullContent" class="w-full h-full flex items-center justify-center p-4"></div>
        <i class="fas fa-times absolute top-6 right-6 text-white text-2xl cursor-pointer"></i>
    </div>

    <script>
        // Supabase Initialization
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let draftData = { texts: [], images: [], voices: [], videos: [], docs: [] };
        let deliveryCharges = 150; 
        let selectedItems = []; 
        let userPhone = localStorage.getItem('faster_phone');
        let fullSavedAddress = ""; 

        // Camera & Video Variables
        let stream = null;
        let currentFacingMode = "environment";
        let cameraMode = "photo";
        let isRecording = false;
        let camMediaRecorder;
        let videoChunks = [];
        let camTimerInterval;
        
        // Voice Variables
        let audioRecorder;
        let audioChunks = [];
        let voiceTimerInterval;
        let voiceSeconds = 0;
        
        // Audio Notification Setup
        const sound = document.getElementById('notifSound');

        function ring() { 
            if(!sound) return;
            sound.currentTime = 0; 
            let playPromise = sound.play();
            if (playPromise !== undefined) { 
                playPromise.catch(error => { 
                    console.warn("Auto-play blocked:", error); 
                }); 
            }
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]); 
            }
        }

        function unlockAudio() {
            if(sound) {
                sound.muted = true;
                sound.play().then(() => {
                    sound.pause(); 
                    sound.currentTime = 0; 
                    sound.muted = false;
                    document.removeEventListener('touchstart', unlockAudio);
                    document.removeEventListener('click', unlockAudio);
                }).catch(e => console.warn(e));
            }
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        // Deep Linking (GoNative)
        function gonative_onesignal_notification_opened(jsonData) {
            try {
                if(jsonData && jsonData.additionalData) {
                    if (jsonData.additionalData.type === 'chat' && jsonData.additionalData.order_id) { 
                        window.location.href = 'chat.html?order_id=' + jsonData.additionalData.order_id; 
                    } else if (jsonData.additionalData.target_url) { 
                        window.location.href = jsonData.additionalData.target_url; 
                    } else { 
                        window.location.href = 'active-orders.html'; 
                    }
                } else { 
                    window.location.href = 'active-orders.html'; 
                }
            } catch(e) {
                console.error("Deep link failed:", e);
            }
        }

        function setupRealtime() {
            if(!userPhone) return;
            
            _supabase.removeAllChannels(); 
            
            _supabase.channel('new-order-live')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'order_chats' }, (payload) => { 
                    if(payload.new && payload.new.sender_phone !== userPhone) {
                        ring(); 
                    }
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, (payload) => { 
                    if(payload.new && payload.new.customer_phone === userPhone) {
                        ring(); 
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, (payload) => { 
                    if(payload.new && payload.new.receiver_id === userPhone) {
                        ring(); 
                    }
                })
                .subscribe();
        }

        // Custom Camera WebRTC Functionality
        async function startCustomCamera() {
            toggleAttachMenu();
            document.getElementById('customCamOverlay').classList.remove('hidden');
            document.getElementById('customCamOverlay').classList.add('flex');
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode }, 
                    audio: true 
                });
                document.getElementById('v').srcObject = stream;
            } catch (e) { 
                alert("Camera Access Denied! Please enable camera permissions."); 
                stopCustomCamera(); 
            }
        }

        function stopCustomCamera() {
            if(stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            document.getElementById('customCamOverlay').classList.add('hidden');
            document.getElementById('customCamOverlay').classList.remove('flex');
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            stopCustomCamera(); 
            startCustomCamera();
        }

        function setMode(m) {
            cameraMode = m;
            document.getElementById('pTab').className = (m === 'photo') ? 'text-white border-b-2 border-white pb-1' : 'pb-1';
            document.getElementById('vTab').className = (m === 'video') ? 'text-white border-b-2 border-white pb-1' : 'pb-1';
            document.getElementById('camBtn').style.backgroundColor = (m === 'photo') ? 'white' : '#ef4444';
        }

        function handleCapture() {
            if(cameraMode === 'photo') {
                const v = document.getElementById('v');
                const c = document.getElementById('c');
                
                c.width = v.videoWidth; 
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(async b => {
                    const cap = await Dialog.show("Photo Detail", "Add a caption... (Optional)", "prompt");
                    addToDraft('image', { file: b, caption: cap });
                    stopCustomCamera();
                }, 'image/jpeg');
            } else { 
                if(isRecording) {
                    stopVideo();
                } else {
                    startVideo();
                }
            }
        }

        function startVideo() {
            isRecording = true; 
            videoChunks = [];
            
            camMediaRecorder = new MediaRecorder(stream);
            camMediaRecorder.ondataavailable = e => videoChunks.push(e.data);
            
            camMediaRecorder.onstop = () => {
                addToDraft('video', new Blob(videoChunks, {type:'video/mp4'}));
            };
            
            camMediaRecorder.start();
            
            document.getElementById('camTimerDisplay').classList.remove('hidden');
            document.getElementById('camBtn').classList.add('animate-pulse');
            
            let s = 0; 
            camTimerInterval = setInterval(() => {
                s++; 
                document.getElementById('camTimerDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function stopVideo() {
            isRecording = false; 
            camMediaRecorder.stop();
            clearInterval(camTimerInterval);
            
            document.getElementById('camBtn').classList.remove('animate-pulse');
            document.getElementById('camTimerDisplay').classList.add('hidden');
            stopCustomCamera();
        }

        // Custom Dialog System
        const Dialog = {
            show: function(title, text, type = 'alert') {
                return new Promise((resolve) => {
                    const modal = document.getElementById('customModal');
                    const box = document.getElementById('modalBox');
                    const tEl = document.getElementById('modalTitle');
                    const textEl = document.getElementById('modalText');
                    const inp = document.getElementById('modalInput');
                    const btns = document.getElementById('modalButtons');

                    tEl.innerText = title;
                    
                    if(text) { 
                        textEl.innerText = text; 
                        textEl.classList.remove('hidden'); 
                    } else { 
                        textEl.classList.add('hidden'); 
                    }

                    modal.classList.remove('hidden'); 
                    modal.classList.add('flex');
                    
                    setTimeout(() => { 
                        box.classList.remove('scale-95', 'opacity-0'); 
                        box.classList.add('scale-100', 'opacity-100'); 
                    }, 10);

                    const close = (val) => {
                        box.classList.remove('scale-100', 'opacity-100'); 
                        box.classList.add('scale-95', 'opacity-0');
                        setTimeout(() => { 
                            modal.classList.add('hidden'); 
                            modal.classList.remove('flex'); 
                            resolve(val); 
                        }, 200);
                    };

                    btns.innerHTML = '';
                    
                    if (type === 'alert') {
                        inp.classList.add('hidden');
                        btns.innerHTML = `<button class="bg-orange-500 text-white px-5 py-2.5 rounded-xl font-bold text-sm w-full">OK</button>`;
                        btns.querySelector('button').onclick = () => close(true);
                        
                    } else if (type === 'confirm') {
                        inp.classList.add('hidden');
                        btns.innerHTML = `
                            <button class="bg-gray-100 text-gray-700 px-4 py-2.5 rounded-xl font-bold text-sm flex-1">Cancel</button>
                            <button class="bg-orange-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm flex-1 shadow-md">Yes, Proceed</button>
                        `;
                        btns.querySelectorAll('button')[0].onclick = () => close(false); 
                        btns.querySelectorAll('button')[1].onclick = () => close(true);
                        
                    } else if (type === 'prompt') {
                        inp.classList.remove('hidden'); 
                        inp.value = '';
                        btns.innerHTML = `
                            <button class="bg-gray-100 text-gray-700 px-4 py-2.5 rounded-xl font-bold text-sm">Skip</button>
                            <button class="bg-orange-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm flex-1 shadow-md">Save</button>
                        `;
                        btns.querySelectorAll('button')[0].onclick = () => close(''); 
                        btns.querySelectorAll('button')[1].onclick = () => close(inp.value.trim());
                        setTimeout(() => inp.focus(), 150);
                    }
                });
            }
        };

        // Page Initialization
        async function initPage() {
            if(!userPhone) {
                return window.location.replace('index.html');
            }
            
            document.getElementById('editName').value = localStorage.getItem('faster_name') || "";
            document.getElementById('editAddress').value = localStorage.getItem('faster_address') || "";
            
            setupRealtime();

            try {
                if(navigator.onLine) {
                    const { data: settings } = await _supabase.from('app_settings').select('customer_delivery_fee').limit(1);
                    if (settings && settings.length > 0) {
                        deliveryCharges = settings[0].customer_delivery_fee;
                    }

                    const { data: { session } } = await _supabase.auth.getSession();
                    if(session) {
                        const { data: customerData } = await _supabase.from('customers').select('name, address').eq('email', session.user.email).single();
                        
                        if (customerData) {
                            if (customerData.name) { 
                                document.getElementById('editName').value = customerData.name; 
                                localStorage.setItem('faster_name', customerData.name); 
                            }
                            if (customerData.address) { 
                                fullSavedAddress = customerData.address; // Pura address GPS ke sath backend ke liye save kiya
                                let displayAddr = customerData.address;
                                if(displayAddr.includes(" | GPS: ")) {
                                    displayAddr = displayAddr.split(" | GPS: ")[0].trim(); // GPS wala link cut kar diya
                                }
                                document.getElementById('editAddress').value = displayAddr; // Box mein clean address show kiya
                                localStorage.setItem('faster_address', customerData.address); 
                            }
                        }
                    }
                }
            } catch (e) { 
                console.error("Data fetch error:", e); 
            }
        }
        
        initPage();

        function toggleAttachMenu() {
            document.getElementById('attachMenu').classList.toggle('active');
            document.getElementById('plusIcon').classList.toggle('rotate-45');
            document.getElementById('plusIcon').classList.toggle('text-orange-500');
        }

        function handleInput(el) {
            el.style.height = '44px'; 
            el.style.height = Math.min(el.scrollHeight, 120) + 'px'; 
            const val = el.value.trim();
            document.getElementById('sendBtn').classList.toggle('hidden', val === "");
            document.getElementById('voiceBtn').classList.toggle('hidden', val !== "");
        }

        async function previewFile(input, mode) {
            if(!input.files || input.files.length === 0) return;
            
            for (const file of Array.from(input.files)) {
                const type = file.type.startsWith('video') ? 'video' : (mode === 'doc' ? 'doc' : 'image');
                
                if(type === 'image') {
                    const caption = await Dialog.show("Add Caption", "Would you like to add a message with this picture? (Optional)", "prompt");
                    addToDraft('image', { file: file, caption: caption || "" });
                } else { 
                    addToDraft(type, file); 
                }
            }
            input.value = ""; 
        }

        function addToDraft(type, content) {
            document.getElementById('emptyPlaceholder').style.display = 'none';
            const chat = document.getElementById('chatArea');
            const bId = "b-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
            const b = document.createElement('div');
            
            b.className = "bubble customer-bubble animate-pop"; 
            b.id = bId;

            let itemData = content;
            
            if (type === 'text') {
                const val = (typeof content === 'string') ? content : document.getElementById('orderInput').value.trim();
                if(!val) return; 
                
                itemData = val; 
                b.innerHTML = `<p class="whitespace-pre-wrap">${val}</p>`;
                
                if(typeof content !== 'string') { 
                    document.getElementById('orderInput').value = ""; 
                    handleInput(document.getElementById('orderInput')); 
                }
            } else if (type === 'image') {
                const imgUrl = URL.createObjectURL(content.file);
                b.innerHTML = `
                    <img src="${imgUrl}" class="media-thumb shadow-sm">
                    ${content.caption ? `<div class="caption-text font-bold text-gray-800">${content.caption}</div>` : ''}
                `;
            } else if (type === 'video') {
                b.innerHTML = `<video src="${URL.createObjectURL(content)}" class="media-thumb shadow-sm" playsinline preload="metadata"></video>`;
            } else if (type === 'voice') {
                b.innerHTML = `
                    <div class="flex items-center gap-1">
                        <audio src="${URL.createObjectURL(content)}" controls class="h-8 w-44"></audio>
                    </div>
                `;
            } else if (type === 'doc') {
                let iconClass = "fas fa-file text-gray-500";
                if(content.name.endsWith('.pdf')) iconClass = "fas fa-file-pdf text-red-500";
                else if(content.name.match(/\.(doc|docx)$/)) iconClass = "fas fa-file-word text-blue-500";
                
                b.innerHTML = `
                    <div class="flex items-center gap-3 p-1 text-sm font-bold text-gray-700">
                        <div class="bg-gray-100 p-3 rounded-lg"><i class="${iconClass} text-xl"></i></div>
                        <div class="flex flex-col truncate w-32">
                            <span class="truncate">${content.name}</span>
                            <span class="text-[10px] text-gray-400 font-normal">${(content.size / 1024).toFixed(1)} KB</span>
                        </div>
                    </div>
                `;
            }

            let pressTimer;
            b.addEventListener('touchstart', (e) => { 
                pressTimer = setTimeout(() => { 
                    toggleSelect(bId, type); 
                    if(navigator.vibrate) navigator.vibrate(50); 
                }, 500); 
            });
            b.addEventListener('touchmove', () => clearTimeout(pressTimer)); 
            b.addEventListener('touchend', () => clearTimeout(pressTimer));
            
            b.addEventListener('click', () => {
                if (selectedItems.length > 0) { 
                    toggleSelect(bId, type); 
                } else if (type === 'image' || type === 'video') {
                    const src = type === 'image' ? URL.createObjectURL(content.file) : URL.createObjectURL(content);
                    openFull({src: src}, type === 'image' ? 'img' : 'vid');
                }
            });

            const key = type === 'text' ? 'texts' : type + 's';
            draftData[key].push({ id: bId, data: itemData });
            
            chat.appendChild(b); 
            chat.scrollTop = chat.scrollHeight;
            document.getElementById('confirmBtnRow').classList.remove('hidden');
        }

        function toggleSelect(id, type) {
            const idx = selectedItems.findIndex(item => item.id === id);
            const el = document.getElementById(id);
            
            if (idx > -1) { 
                selectedItems.splice(idx, 1); 
                el.classList.remove('bubble-selected'); 
            } else { 
                selectedItems.push({ id, type }); 
                el.classList.add('bubble-selected'); 
            }

            if (selectedItems.length > 0) {
                document.getElementById('customerDetailsBox').classList.add('hidden');
                document.getElementById('selectionHeader').classList.remove('hidden');
                document.getElementById('selectionCount').innerText = selectedItems.length;
                
                const showEdit = (selectedItems.length === 1 && (selectedItems[0].type === 'text' || selectedItems[0].type === 'image'));
                document.getElementById('editIcon').classList.toggle('hidden', !showEdit);
            } else { 
                cancelSelection(); 
            }
        }

        function cancelSelection() {
            selectedItems.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) { el.classList.remove('bubble-selected'); }
            });
            selectedItems = [];
            document.getElementById('selectionHeader').classList.add('hidden');
            document.getElementById('customerDetailsBox').classList.remove('hidden');
        }

        function editSelected() {
            if(selectedItems.length !== 1) return;
            const sel = selectedItems[0];
            const inp = document.getElementById('orderInput');
            
            if(sel.type === 'text') { 
                inp.value = draftData.texts.find(t => t.id === sel.id).data; 
            } else if(sel.type === 'image') { 
                inp.value = draftData.images.find(i => i.id === sel.id).data.caption; 
            }
            
            confirmDelete(); 
            handleInput(inp); 
            inp.focus();
        }

        function confirmDelete() {
            if (selectedItems.length === 0) return;
            
            selectedItems.forEach(sel => {
                const key = sel.type === 'text' ? 'texts' : sel.type + 's';
                draftData[key] = draftData[key].filter(item => item.id !== sel.id);
                
                const el = document.getElementById(sel.id);
                if (el) { el.remove(); }
            });
            
            cancelSelection();
            
            if (Object.values(draftData).flat().length === 0) {
                document.getElementById('confirmBtnRow').classList.add('hidden');
                document.getElementById('emptyPlaceholder').style.display = 'flex';
            }
        }

        function startVoiceTimer() {
            voiceSeconds = 0; 
            document.getElementById('recordTimer').innerText = "00:00";
            
            document.getElementById('textInputWrapper').classList.add('hidden');
            document.getElementById('recordingTimerUI').classList.remove('hidden');
            document.getElementById('recordingTimerUI').classList.add('flex');
            
            voiceTimerInterval = setInterval(() => {
                voiceSeconds++; 
                const m = Math.floor(voiceSeconds / 60).toString().padStart(2, '0');
                const s = (voiceSeconds % 60).toString().padStart(2, '0');
                document.getElementById('recordTimer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopVoiceTimer() {
            clearInterval(voiceTimerInterval);
            document.getElementById('recordingTimerUI').classList.add('hidden');
            document.getElementById('recordingTimerUI').classList.remove('flex');
            document.getElementById('textInputWrapper').classList.remove('hidden');
        }

        async function handleVoice() {
            const vBtn = document.getElementById('voiceBtn');
            const micIcon = document.getElementById('micIcon');
            
            if (!navigator.mediaDevices) {
                return Dialog.show("Error", "Microphone access blocked.", "alert");
            }

            try {
                if (!audioRecorder || audioRecorder.state === "inactive") {
                    const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioRecorder = new MediaRecorder(aStream); 
                    audioChunks = [];
                    
                    audioRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    audioRecorder.onstop = () => { 
                        addToDraft('voice', new Blob(audioChunks, { type: 'audio/webm' })); 
                        aStream.getTracks().forEach(track => track.stop()); 
                        stopVoiceTimer(); 
                    };
                    
                    audioRecorder.start(); 
                    startVoiceTimer();
                    
                    vBtn.classList.add('voice-active'); 
                    micIcon.className = 'fas fa-stop';
                } else {
                    audioRecorder.stop(); 
                    vBtn.classList.remove('voice-active'); 
                    micIcon.className = 'fas fa-microphone';
                }
            } catch (e) { 
                Dialog.show("Error", "Please allow microphone permission.", "alert"); 
            }
        }

        async function handleConfirmPrompt() {
            if (!navigator.onLine) {
                return Dialog.show("No Internet", "Connect to the internet to submit your order.", "alert");
            }
            
            const { data: { session } } = await _supabase.auth.getSession();
            
            if(!session) { 
                await Dialog.show("Session Expired", "Please login again."); 
                window.location.replace("index.html"); 
                return; 
            }
            
            const confirmMsg = `The Delivery Charges will be Rs. ${deliveryCharges}. Do you want to proceed?`;
            const userConfirmed = await Dialog.show("Confirm Order", confirmMsg, "confirm");
            
            if (userConfirmed) {
                finalSubmitOrder(session.user.email);
            }
        }

        async function finalSubmitOrder(userEmail) {
            const btn = document.getElementById('finalSubmitBtn');
            const name = document.getElementById('editName').value.trim();
            // Niche wali line change ki hai taake hidden GPS location database mein jaye
            const addr = fullSavedAddress || document.getElementById('editAddress').value.trim(); 
            
            if(!name || !addr) {
                return Dialog.show("Missing Information", "Please provide Name and Address.");
            }

            btn.disabled = true; 
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Processing...`; 
            btn.classList.replace('bg-orange-600', 'bg-gray-400');

            try {
                if (userEmail) {
                    await _supabase.from('customers').update({ name: name, address: addr }).eq('email', userEmail);
                }

                const uploadAll = async (items, prefix, defaultExt) => {
                    const promises = items.map(async (item) => {
                        const file = item.data.file || item.data; 
                        const ext = file.name ? file.name.split('.').pop() : defaultExt;
                        const fileName = `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2,4)}.${ext}`;
                        
                        const { error } = await _supabase.storage.from('order-files').upload(fileName, file);
                        if(error) throw error;
                        
                        return _supabase.storage.from('order-files').getPublicUrl(fileName).data.publicUrl;
                    });
                    
                    const urls = await Promise.all(promises);
                    return urls.join(",");
                };
                
                const [imgURLs, vidURLs, vceURLs, docURLs] = await Promise.all([
                    uploadAll(draftData.images, 'img', 'jpg'), 
                    uploadAll(draftData.videos, 'vid', 'mp4'),
                    uploadAll(draftData.voices, 'voice', 'webm'), 
                    uploadAll(draftData.docs, 'doc', 'pdf')
                ]);
                
                const textData = draftData.texts.map(t => t.data);
                const captionData = draftData.images.filter(i => i.data.caption).map(i => "Photo Caption: " + i.data.caption);
                const combinedDetails = [...textData, ...captionData].join(" | ");

                // FIXED: dc_amount add kiya gaya hai
                const { error } = await _supabase.from('orders').insert([{
                    customer_phone: userPhone, 
                    customer_name: name, 
                    delivery_address: addr, 
                    order_details: combinedDetails,
                    image_url: imgURLs, 
                    video_url: vidURLs, 
                    voice_url: vceURLs, 
                    doc_url: docURLs, 
                    status: 'pending',
                    dc_amount: deliveryCharges 
                }]);
                
                if(error) throw error;
                
                await Dialog.show("Success", "Your order has been placed successfully! ✅", "alert");
                window.location.href = "home.html";
                
            } catch (err) { 
                await Dialog.show("Error", "Error placing order: " + err.message, "alert"); 
                btn.disabled = false; 
                btn.innerHTML = `Confirm order <i class="fas fa-check-circle text-white opacity-80 text-lg"></i>`; 
                btn.classList.replace('bg-gray-400', 'bg-orange-600');
            }
        }

        function openFull(el, type) {
            const fv = document.getElementById('fullView'); 
            fv.style.display = 'flex';
            
            if (type === 'img') {
                document.getElementById('fullContent').innerHTML = `<img src="${el.src}" class="max-w-full max-h-full rounded object-contain">`;
            } else {
                document.getElementById('fullContent').innerHTML = `<video src="${el.src}" controls autoplay playsinline class="max-w-full max-h-full rounded"></video>`;
            }
        }
        // --- CLOSE ATTACH MENU ON OUTSIDE CLICK ---
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('attachMenu');
            const plusBtn = document.getElementById('plusBtn');

            // Agar menu khula hua hai...
            if (menu && menu.classList.contains('active')) {
                // Aur customer ne menu ya plus button ke ilawa bahar kahin bhi click kiya hai...
                if (!menu.contains(event.target) && !plusBtn.contains(event.target)) {
                    toggleAttachMenu(); // Toh menu ko band kar do aur icon ko wapis set kar do
                }
            }
        });

        window.addEventListener('offline', () => {
            document.getElementById('offlineBanner').style.top = '0';
        });
        
        window.addEventListener('online', () => { 
            document.getElementById('offlineBanner').style.top = '-50px'; 
            initPage(); 
        });
    </script>
</body>
