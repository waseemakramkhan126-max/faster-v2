<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Faster - My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        html, body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f9fafb;
            padding-top: env(safe-area-inset-top);
        }
        
        .clay-card {
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 10px 10px 20px #e5e7eb, -10px -10px 20px #ffffff;
        }

        .clay-input {
            background: #f9fafb;
            box-shadow: inset 4px 4px 8px #e5e7eb, inset -4px -4px 8px #ffffff;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .clay-input:focus {
            box-shadow: inset 6px 6px 10px #e5e7eb, inset -6px -6px 10px #ffffff;
            border-color: #3b82f6; 
            background: #ffffff;
        }

        .clay-btn {
            background: #3b82f6;
            box-shadow: 6px 6px 12px #93c5fd, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
        }

        .clay-btn:active {
            box-shadow: inset 4px 4px 8px #2563eb, inset -4px -4px 8px #60a5fa;
            transform: scale(0.97);
        }

        /* Map Modal Animations */
        .map-enter { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .map-leave { transform: translateY(100%); opacity: 0; pointer-events: none; }

        /* Map Center Pin */
        .center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        #offlineBanner { transition: top 0.3s ease-in-out; z-index: 9999; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

    <div id="offlineBanner" class="fixed top-[-50px] left-0 w-full bg-red-500 text-white text-center text-[10px] uppercase tracking-widest py-2 font-black shadow-md flex justify-center items-center gap-2">
        <i class="fas fa-wifi-slash"></i> No Internet Connection
    </div>

    <header class="p-5 flex items-center gap-4 bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-gray-100 pt-safe">
        <i class="fas fa-arrow-left text-xl text-gray-700 cursor-pointer active:scale-90 transition p-2 bg-gray-50 rounded-full shadow-sm border border-gray-100" onclick="window.history.back()"></i>
        <h1 class="text-xl font-black text-gray-800 tracking-tighter uppercase">My <span class="text-blue-500">Profile</span></h1>
    </header>

    <main class="p-6 flex-1 flex flex-col justify-center max-w-md w-full mx-auto">
        
        <div id="mainLoader" class="flex flex-col items-center justify-center py-10">
            <i class="fas fa-circle-notch fa-spin text-blue-500 text-4xl mb-3"></i>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Fetching Details...</span>
        </div>

        <div id="profileFormSection" class="w-full clay-card p-8 border border-gray-100 hidden">
            
            <div class="flex flex-col items-center mb-6">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center shadow-inner border border-blue-100 mb-3">
                    <i class="fas fa-user-edit text-blue-500 text-3xl"></i>
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-4 tracking-widest">Full Name</label>
                    <div class="relative mt-1">
                        <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="nameInput" placeholder="Enter your name" 
                            class="w-full clay-input h-14 rounded-2xl pl-12 pr-4 font-bold text-gray-700 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-4 tracking-widest">Phone Number</label>
                    <div class="relative mt-1">
                        <i class="fas fa-phone absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="tel" id="phoneInput" placeholder="03XXXXXXXXX" 
                            class="w-full clay-input h-14 rounded-2xl pl-12 pr-4 font-bold text-gray-700 outline-none">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-1 px-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest">Delivery Address</label>
                        <button onclick="openMapModal()" id="locBtn" type="button" class="text-[10px] font-black text-blue-600 bg-blue-100 px-3 py-1.5 rounded-xl active:scale-90 transition-transform flex items-center gap-1.5 shadow-sm border border-blue-200">
                            <i class="fas fa-map-marked-alt"></i> Pick on Map
                        </button>
                    </div>
                    <div class="relative">
                        <i class="fas fa-home absolute left-5 top-5 text-gray-400"></i>
                        <textarea id="addressInput" placeholder="House/Flat #, Street, Area..." rows="3" 
                            class="w-full clay-input rounded-2xl pl-12 pr-4 py-4 font-bold text-gray-700 outline-none leading-relaxed"></textarea>
                    </div>
                    <p class="text-[9px] text-gray-400 font-bold ml-4 mt-1"><i class="fas fa-info-circle text-blue-400"></i> Set pin on map to help rider find you exactly.</p>
                </div>

                <button onclick="updateProfile()" id="saveBtn" 
                    class="w-full clay-btn text-white font-black h-16 rounded-2xl flex items-center justify-center gap-3 mt-8 uppercase tracking-widest text-sm">
                    <span id="btnText">Save Changes</span>
                    <i id="btnIcon" class="fas fa-check"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="mapModal" class="map-leave fixed inset-0 z-50 bg-white flex flex-col transition-all duration-300">
        <div class="bg-white p-4 shadow-md flex justify-between items-center z-10 shrink-0 pt-safe">
            <h2 class="font-black text-gray-800"><i class="fas fa-map-marker-alt text-red-500 mr-2"></i> Set Exact Location</h2>
            <button onclick="closeMapModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center active:bg-gray-200 transition">
                <i class="fas fa-times text-gray-600"></i>
            </button>
        </div>
        
        <div class="relative flex-1 bg-gray-200">
            <div id="map" class="w-full h-full"></div>
            
            <div class="center-pin text-red-500 text-[40px]">
                <i class="fas fa-map-pin drop-shadow-xl"></i>
            </div>
            
            <button onclick="locateMe()" class="absolute bottom-6 right-4 z-[1000] w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-blue-600 border border-gray-100 active:scale-90 transition">
                <i class="fas fa-crosshairs text-xl"></i>
            </button>
        </div>

        <div class="p-6 bg-white shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-10 relative">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center mb-3">Drag map to adjust pin perfectly</p>
            <button onclick="confirmLocation()" id="confirmLocBtn" class="w-full bg-blue-600 text-white font-black h-14 rounded-2xl shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                <i class="fas fa-check-circle"></i> Confirm Pin
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- SECURE INITIALIZATION ---
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        let originalPhone = "";
        let userEmail = "";
        let map; 
        let exactLatLng = ""; 

        // --- FETCH PROFILE DATA ---
        async function fetchProfileData() {
            if (!navigator.onLine) { alert("Please connect to the internet."); return; }

            try {
                const { data: { session }, error: sessionError } = await _supabase.auth.getSession();
                if (sessionError || !session) { window.location.replace('index.html'); return; }
                userEmail = session.user.email.toLowerCase();

                const { data: userData, error: fetchError } = await _supabase
                    .from('customers')
                    .select('name, phone, address')
                    .eq('email', userEmail)
                    .single();

                if (fetchError) throw fetchError;

                if (userData) {
                    document.getElementById('nameInput').value = userData.name || "";
                    document.getElementById('phoneInput').value = userData.phone || "";
                    
                    originalPhone = userData.phone; 
                    
                    let dbAddress = userData.address || "";
                    
                    // Background GPS filter logic
                    if (dbAddress.includes(" | GPS: ")) {
                        let parts = dbAddress.split(" | GPS: ");
                        document.getElementById('addressInput').value = parts[0].trim();
                        exactLatLng = parts[1].trim(); 
                        
                        // Button ko green kar do kyunke location saved hai
                        const locBtn = document.getElementById('locBtn');
                        locBtn.innerHTML = '<i class="fas fa-check-circle"></i> Pin Saved';
                        locBtn.classList.replace('text-blue-600', 'text-emerald-600');
                        locBtn.classList.replace('bg-blue-100', 'bg-emerald-100');
                        locBtn.classList.replace('border-blue-200', 'border-emerald-200');
                    } else {
                        document.getElementById('addressInput').value = dbAddress;
                    }
                    
                    document.getElementById('mainLoader').classList.add('hidden');
                    document.getElementById('profileFormSection').classList.remove('hidden');
                }
            } catch (err) {
                alert("Could not load profile."); window.location.replace('home.html');
            }
        }

        // --- MAP LOGIC (FOODPANDA STYLE) ---
        function openMapModal() {
            document.getElementById('mapModal').classList.replace('map-leave', 'map-enter');
            
            if (!map) {
                // Initial Default location
                map = L.map('map', { zoomControl: false }).setView([31.5204, 74.3587], 14);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);
            }
            
            setTimeout(() => { map.invalidateSize(); locateMe(); }, 300);
        }

        function closeMapModal() {
            document.getElementById('mapModal').classList.replace('map-enter', 'map-leave');
        }

        function locateMe() {
            if (!navigator.geolocation) { alert("GPS not supported."); return; }

            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.flyTo([lat, lng], 18, { animate: true, duration: 1.5 });
            }, (err) => {
                alert("Please allow GPS location permission in your phone settings.");
            }, options);
        }

        // CONFIRM PIN LOCATION (Address box khali rahega)
        function confirmLocation() {
            const btn = document.getElementById('confirmLocBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving Pin...';
            
            const center = map.getCenter();
            const lat = center.lat;
            const lng = center.lng;

            // Save location in memory
            exactLatLng = `${lat},${lng}`;
            localStorage.setItem('faster_exact_location', exactLatLng);

            setTimeout(() => {
                closeMapModal();
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm Pin';
                
                // Update Button UI to show pin is saved
                const locBtn = document.getElementById('locBtn');
                locBtn.innerHTML = '<i class="fas fa-check-circle"></i> Pin Saved';
                locBtn.classList.replace('text-blue-600', 'text-emerald-600');
                locBtn.classList.replace('bg-blue-100', 'bg-emerald-100');
                locBtn.classList.replace('border-blue-200', 'border-emerald-200');
                
                // Focus on address input so customer can write manually
                document.getElementById('addressInput').focus();
            }, 500);
        }

        // --- UPDATE PROFILE FUNCTION ---
        async function updateProfile() {
            const newName = document.getElementById('nameInput').value.trim();
            const newPhone = document.getElementById('phoneInput').value.trim();
            const typedAddress = document.getElementById('addressInput').value.trim();
            
            const btn = document.getElementById('saveBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            if (!newName || !newPhone || !typedAddress) { alert("Please fill out all fields!"); return; }
            if (!navigator.onLine) { alert("No internet connection!"); return; }

            btn.disabled = true;
            btnText.innerText = 'Updating...';
            btnIcon.className = 'fas fa-circle-notch fa-spin';

            try {
                if (newPhone !== originalPhone) {
                    const { data: existingUser } = await _supabase.from('customers').select('email').eq('phone', newPhone).maybeSingle();
                    if (existingUser && existingUser.email !== userEmail) {
                        alert(`🚨 ERROR: The number ${newPhone} is already registered.`);
                        resetBtnUI(); return;
                    }
                }

                // Append exact location invisibly to the address if available
                let finalSaveAddress = typedAddress;
                if (exactLatLng) {
                    finalSaveAddress = typedAddress + " | GPS: " + exactLatLng;
                }

                const { error: updateError } = await _supabase
                    .from('customers')
                    .update({ name: newName, phone: newPhone, address: finalSaveAddress })
                    .eq('email', userEmail);

                if (updateError) throw updateError;

                localStorage.setItem('faster_phone', newPhone);
                localStorage.setItem('faster_name', newName);
                localStorage.setItem('faster_address', typedAddress); // Storage mein saaf address save karo

                if (newPhone !== originalPhone) {
                    try { window.location.href = "gonative://onesignal/externalId/set?id=" + newPhone; } catch(e){}
                }

                btnText.innerText = 'Updated Successfully!';
                btnIcon.className = 'fas fa-check-circle';
                btn.style.background = '#22c55e'; 

                setTimeout(() => { window.location.replace('home.html'); }, 1000);
            } catch (err) {
                alert("Error updating profile: " + err.message);
                resetBtnUI();
            }
        }

        function resetBtnUI() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = false;
            document.getElementById('btnText').innerText = 'Save Changes';
            document.getElementById('btnIcon').className = 'fas fa-check';
        }

        window.addEventListener('offline', () => { document.getElementById('offlineBanner').style.top = '0'; });
        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').style.top = '-50px';
            if(document.getElementById('profileFormSection').classList.contains('hidden')) { fetchProfileData(); }
        });

        window.onload = () => { fetchProfileData(); };
    </script>
</body>
</html>
