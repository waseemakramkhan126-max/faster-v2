<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Faster - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        /* Strict Mobile WebView & iOS Optimization */
        html, body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior-y: none; /* Block Pull-to-refresh */
            -webkit-tap-highlight-color: transparent; /* Block blue tap flash */
            user-select: none; /* Block text highlighting */
            -webkit-user-select: none;
            padding-top: env(safe-area-inset-top); /* iPhone Notch Fix */
            background-color: #f9fafb;
        }
        
        /* --- ANIMATIONS --- */
        
        /* 1. Active Order Continuous Zoom & Green Glow */
        @keyframes order-continuous-pulse {
            0% { transform: scale(1); background-color: #f0fdf4; border-color: #4ade80; }
            50% { transform: scale(1.04); background-color: #dcfce7; border-color: #22c55e; box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4); }
            100% { transform: scale(1); background-color: #f0fdf4; border-color: #4ade80; }
        }
        .active-order-continuous-glow { 
            animation: order-continuous-pulse 2s ease-in-out infinite !important; 
            border-width: 2px !important; border-color: #22c55e !important; 
            background-color: #f0fdf4 !important; z-index: 40; 
        }

        /* 2. Bell Icon Red Pulse Alert */
        @keyframes bell-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0)); color: #9ca3af; }
            50% { transform: scale(1.2) rotate(15deg); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.8)); color: #ef4444; }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0)); color: #9ca3af; }
        }
        .bell-active { animation: bell-pulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite !important; color: #ef4444 !important; }

        /* Notification Dot Badge */
        .notif-badge { 
            position: absolute; top: -2px; right: -2px; 
            background: #ef4444; border: 2px solid white; 
            width: 12px; height: 12px; border-radius: 50%; 
            display: none; z-index: 10; 
        }
        @keyframes badge-pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .notif-badge.active { display: block; animation: badge-pulse 1.5s infinite; }

        /* General UI Elements */
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        .sidebar.active { transform: translateX(0); }
        .brand-logo-gol { object-fit: cover; border-radius: 9999px; border: 2px solid #f97316; background: white; box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.2); }
        .action-card { transition: all 0.2s ease; position: relative; }
        .action-card:active { transform: scale(0.95); }
        
        #offlineBanner { transition: top 0.3s ease-in-out; z-index: 9999; }
    </style>
</head>
<body class="text-gray-800">

    <script>
        // --- SECURE INITIALIZATION ---
        const SB_URL = "https://hkabhikizdlbavfkualt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrYWJoaWtpemRsYmF2Zmt1YWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgyMjUsImV4cCI6MjA5MjA2NDIyNX0.iMlS6-M1aylW8K915LPYDHOg7qUxwu5GelH_CPHLP2U";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const userPhone = (localStorage.getItem('faster_phone') || "").trim();
        const userName = localStorage.getItem('faster_name') || 'Customer';
        
        if (!userPhone) {
            window.location.replace('index.html');
        } else {
            // Safe OneSignal External ID Registration for Median Webview
            try { 
                window.location.href = "gonative://onesignal/externalId/set?id=" + userPhone; 
            } catch (e) { console.warn("OneSignal linking skipped"); }
        }

        const sound = document.getElementById('notifSound');

        // --- APP BOOT SEQUENCE ---
        async function initializeApp() {
            if (!navigator.onLine) return; // Wait for connection

            document.getElementById('userName').innerText = userName;

            try {
                // Background Global Logo Fetching
                const { data: settings } = await _supabase.from('app_settings').select('logo_url').eq('id', 1).single();
                if (settings && settings.logo_url) {
                    const imgH = document.getElementById('appLogo');
                    const imgS = document.getElementById('sideLogo');
                    imgH.src = imgS.src = settings.logo_url;
                    imgH.classList.remove('hidden'); imgS.classList.remove('hidden');
                    document.getElementById('logoFallback').classList.add('hidden');
                }
            } catch (err) { console.error("Logo Error:", err); }

            // Fetch Real-time Dashboard Data
            checkNotifications();
            updateActiveOrdersCard();
            fetchWalletBalance();
            setupRealtime();
        }

        // --- WALLET DATA (Proper Error Handling) ---
        async function fetchWalletBalance() {
            if (!navigator.onLine) return;
            document.getElementById('walletLoading').classList.remove('hidden');
            
            try {
                const { data: orders, error } = await _supabase
                    .from('orders').select('balance_amount').eq('customer_phone', userPhone)
                    .eq('status', 'completed').order('updated_at', { ascending: false }).limit(1); 

                if (error) throw error;

                const hPend = document.getElementById('homePend'); const pBox = document.getElementById('homePendBox');
                const hRem = document.getElementById('homeRem'); const rBox = document.getElementById('homeRemBox');

                if (orders && orders.length > 0) {
                    const currentBal = parseFloat(orders[0].balance_amount || 0);
                    if (currentBal > 0) { 
                        hPend.innerText = `Rs. ${currentBal}`; pBox.classList.remove('hidden'); rBox.classList.add('hidden'); 
                    } else if (currentBal < 0) { 
                        hRem.innerText = `Rs. ${Math.abs(currentBal)}`; rBox.classList.remove('hidden'); pBox.classList.add('hidden'); 
                    } else { 
                        pBox.classList.add('hidden'); rBox.classList.add('hidden'); 
                    }
                } else { pBox.classList.add('hidden'); rBox.classList.add('hidden'); }
            } catch (e) { console.error("Wallet error", e); } 
            finally { document.getElementById('walletLoading').classList.add('hidden'); }
        }

        // --- SMART BELL NOTIFICATION CHECKER ---
        async function checkNotifications() {
            if (!navigator.onLine) return;
            try {
                const lastRead = localStorage.getItem('last_notif_read') || '2000-01-01T00:00:00.000Z';
                
                // Concurrent efficient checking
                const [chatRes, orderRes] = await Promise.all([
                    _supabase.from('chats').select('*', { count: 'exact', head: true }).eq('receiver_id', userPhone).gt('created_at', lastRead),
                    _supabase.from('orders').select('*', { count: 'exact', head: true }).eq('customer_phone', userPhone).gt('updated_at', lastRead)
                ]);

                const bell = document.getElementById('notifBell');
                const badge = document.getElementById('notifBadge');
                
                if ((chatRes.count || 0) > 0 || (orderRes.count || 0) > 0) { 
                    badge.classList.add('active'); bell.classList.add('bell-active'); 
                } else { 
                    badge.classList.remove('active'); bell.classList.remove('bell-active'); 
                }
            } catch (e) { console.error("Notification sync failed", e); }
        }

        function openNotifications() {
            localStorage.setItem('last_notif_read', new Date().toISOString());
            window.location.href = 'notifications.html';
        }

        // --- SMART ACTIVE ORDERS CARD (Continuous Zoom & Hybrid Badges) ---
        async function updateActiveOrdersCard() {
            if (!navigator.onLine) return;
            
            try {
                const { data: activeOrders } = await _supabase
                    .from('orders').select('id, updated_at').eq('customer_phone', userPhone)
                    .not('status', 'in', '("completed","canceled","CANCELLED","cancelled")');

                const card = document.getElementById('activeOrdersCard');
                const badge = document.getElementById('activeChatBadge');
                
                if (activeOrders && activeOrders.length > 0) {
                    // Turn ON Continuous Green Pulsing
                    card.classList.add('active-order-continuous-glow');
                    
                    const orderIds = activeOrders.map(o => o.id);
                    
                    // Count Unread Messages
                    const { data: unreadMsgs } = await _supabase
                        .from('order_chats').select('id').in('order_id', orderIds)
                        .neq('sender_phone', userPhone).neq('status', 'seen');
                    
                    let unreadMsgCount = unreadMsgs ? unreadMsgs.length : 0;

                    // Count New Status Changes since last visit
                    let lastVisit = localStorage.getItem('last_active_orders_visit') || '2000-01-01T00:00:00.000Z';
                    let unseenStatusCount = activeOrders.filter(o => o.updated_at > lastVisit).length;

                    let totalAlerts = unreadMsgCount + unseenStatusCount;

                    if (totalAlerts > 0) {
                        badge.innerText = totalAlerts;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                } else {
                    // Turn OFF Pulsing (No Active Orders)
                    card.classList.remove('active-order-continuous-glow');
                    badge.classList.add('hidden');
                }
            } catch (e) { console.error("Active orders UI fail:", e); }
        }

        function openActiveOrders() {
            localStorage.setItem('last_active_orders_visit', new Date().toISOString());
            window.location.href = 'active-orders.html';
        }

        // --- BULLETPROOF AUDIO & RINGTONE LOGIC ---
        function ring() { 
            if(!sound) return;
            sound.currentTime = 0; 
            let playPromise = sound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => { console.warn("Auto-play strict block:", error); });
            }
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]); 
        }

        // Unlock audio context on first interaction (Required for iOS & Android Webviews)
        function unlockAudio() {
            if(sound) {
                sound.muted = true;
                sound.play().then(() => {
                    sound.pause(); sound.currentTime = 0; sound.muted = false;
                    document.removeEventListener('touchstart', unlockAudio);
                    document.removeEventListener('click', unlockAudio);
                }).catch(e => console.warn(e));
            }
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        // --- FLAWLESS REAL-TIME SYNC ---
        function setupRealtime() {
            _supabase.removeAllChannels(); 

            _supabase.channel('customer-home-live')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'order_chats' }, (payload) => { 
                    if(payload.new && payload.new.sender_phone !== userPhone) {
                        checkNotifications(); updateActiveOrdersCard(); ring(); 
                    }
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'order_chats' }, (payload) => { 
                    if(payload.new && payload.new.status === 'seen') {
                        updateActiveOrdersCard(); checkNotifications();
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => { 
                    if(payload.new && payload.new.customer_phone === userPhone) {
                        updateActiveOrdersCard(); checkNotifications(); ring(); 
                    }
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, (payload) => { 
                    if(payload.new && payload.new.customer_phone === userPhone) {
                        updateActiveOrdersCard(); checkNotifications(); fetchWalletBalance(); ring(); 
                    }
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, (payload) => { 
                    if(payload.new && payload.new.receiver_id === userPhone) {
                        checkNotifications(); ring(); 
                    }
                })
                .subscribe();
        }

        // --- UI & STATE INTERACTIONS ---
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        
        // SECURE LOGOUT WITH SUPABASE CLEAR
        async function logout() { 
            if(confirm("Are you sure you want to logout?")) { 
                await _supabase.auth.signOut(); // Supabase session clear
                localStorage.clear(); 
                try { window.location.href = "gonative://onesignal/externalId/remove"; } catch (e) {}
                setTimeout(() => { window.location.replace("index.html"); }, 500);
            } 
        }

        // Dynamic Greeting Based on Device Time
        function setGreeting() {
            const hour = new Date().getHours();
            const greetingEl = document.getElementById('greeting');
            if (hour < 12) greetingEl.innerHTML = '<i class="fas fa-sun text-yellow-500 mr-1"></i> Good Morning,';
            else if (hour < 17) greetingEl.innerHTML = '<i class="fas fa-cloud-sun text-orange-400 mr-1"></i> Good Afternoon,';
            else greetingEl.innerHTML = '<i class="fas fa-moon text-indigo-400 mr-1"></i> Good Evening,';
        }

        // Offline / Online Fallbacks
        window.addEventListener('offline', () => { document.getElementById('offlineBanner').style.top = '0'; });
        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').style.top = '-50px';
            initializeApp();
        });
        
        // Page Visibility Recovery (If app comes back from background)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && navigator.onLine) {
                checkNotifications();
                updateActiveOrdersCard();
                fetchWalletBalance();
            }
        });

        // Initialize Everything
        setGreeting();
        initializeApp();
        // --- PREMIUM MULTI-SLIDER (3:1 AI ALGORITHM + BOREDOM DETECTION) ---
        let currentSlideIndex = 0;
        let slideTimer;
        let isAutoScrolling = false;
        
        // 🧠 AI TRACKING VARIABLES
        let promosData = []; 
        let userInterests = new Set(); 
        let slideStartTime = 0;
        let consecutiveInterestShown = 0; 
        
        // NAYA: Boredom (Jaldi Swipe) Track karne ke liye
        let consecutiveSwipes = 0; 

        async function fetchPromotions() {
            if(!navigator.onLine) return; 
            try {
                const { data: promos, error } = await _supabase
                    .from('promotions')
                    .select('*')
                    .eq('promo_active', true)
                    .order('sort_order', { ascending: true });

                if (error) throw error;

                if (promos && promos.length > 0) {
                    promosData = promos; 
                    const slider = document.getElementById('promoSlider');
                    const dotsContainer = document.getElementById('promoDots');
                    const container = document.getElementById('promoContainer');
                    
                    slider.innerHTML = ''; 
                    dotsContainer.innerHTML = '';

                    promos.forEach((promo, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'promo-slide overflow-hidden shrink-0';
                        
                        let mediaHTML = '';
                        const overlay = `<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent z-10 pointer-events-none"></div>`;
                        
                        if (promo.promo_type === 'video') {
                            mediaHTML = `
                                <div class="relative w-full h-48">
                                    <video id="vid_${index}" src="${promo.promo_url}" muted playsinline class="promo-video w-full h-48 object-cover"></video>
                                    ${overlay}
                                    <button onclick="toggleSliderAudio(event, 'vid_${index}')" class="absolute bottom-3 right-3 w-8 h-8 bg-black/40 text-white rounded-full flex items-center justify-center z-30 backdrop-blur-md border border-white/20 shadow-lg">
                                        <i id="icon_vid_${index}" class="fas fa-volume-mute text-[10px]"></i>
                                    </button>
                                </div>`;
                        } else {
                            mediaHTML = `<div class="w-full h-48 relative"><img src="${promo.promo_url}" class="w-full h-48 object-cover">${overlay}</div>`;
                        }

                        slide.innerHTML = `${mediaHTML} <div class="p-4 bg-gradient-to-br from-white to-orange-50"> <div class="flex items-center gap-2 mb-1"> <span class="w-2 h-2 bg-orange-500 rounded-full animate-ping"></span> <h3 class="font-black text-orange-600 text-[10px] uppercase tracking-widest">${promo.title || 'Special Offer'}</h3> </div> <p class="text-xs text-gray-700 font-bold leading-tight line-clamp-2">${promo.promo_text || ''}</p> </div>`;
                        slider.appendChild(slide);

                        const dot = document.createElement('div');
                        dot.className = `h-1.5 w-1.5 rounded-full bg-gray-300 transition-all duration-300`;
                        dot.id = `dot_${index}`;
                        dotsContainer.appendChild(dot);
                    });

                    container.classList.remove('hidden');

                    // 🧠 SWIPE BOREDOM DETECTION
                    slider.addEventListener('scroll', () => {
                        if (isAutoScrolling) return; 
                        clearTimeout(slider.scrollTimeout);
                        slider.scrollTimeout = setTimeout(() => {
                            let newIndex = Math.round(slider.scrollLeft / slider.offsetWidth);
                            if (newIndex !== currentSlideIndex && newIndex >= 0 && newIndex < promos.length) {
                                
                                // Check karein ke jaldi swipe kiya hai ya dekh kar?
                                const watchTime = (Date.now() - slideStartTime) / 1000;
                                if (watchTime < 3) { 
                                    consecutiveSwipes++; // Jaldi Swipe (Boredom)
                                } else {
                                    consecutiveSwipes = 0; // Der tak dekha
                                }

                                consecutiveInterestShown = 0; 
                                
                                // AGAR 3 DAFA JALDI SWIPE KIYA, TOH CATEGORY CHANGE KARO
                                if (consecutiveSwipes >= 3) {
                                    consecutiveSwipes = 0; // Counter reset
                                    const currentCategory = promos[currentSlideIndex].category;
                                    let jumpIndex = newIndex;
                                    
                                    // Aisi video dhoondo jo is boring category se mukhtalif ho
                                    for (let i = 1; i < promos.length; i++) {
                                        let checkIdx = (newIndex + i) % promos.length;
                                        if (promos[checkIdx].category !== currentCategory) {
                                            jumpIndex = checkIdx;
                                            break;
                                        }
                                    }
                                    
                                    // Customer ko zabardasti nayi category par auto-scroll karao
                                    activateSlide(jumpIndex, true);
                                    return; // Normal scroll rok do
                                }

                                // Normal Swipe chalne do
                                activateSlide(newIndex, false); 
                            }
                        }, 150); 
                    });

                    activateSlide(0, false);
                }
            } catch (err) { console.log("Promo Slider Error:", err); }
        }

        // 🧠 NEXT VIDEO DECISION ALGORITHM (3:1 RULE)
        function getSmartNextIndex() {
            if (userInterests.size === 0) {
                return (currentSlideIndex + 1) % promosData.length;
            }

            if (consecutiveInterestShown < 3) {
                for (let i = 1; i < promosData.length; i++) {
                    let checkIdx = (currentSlideIndex + i) % promosData.length;
                    if (userInterests.has(promosData[checkIdx].category)) {
                        consecutiveInterestShown++; 
                        return checkIdx; 
                    }
                }
            }

            consecutiveInterestShown = 0; 
            
            // 4th video kisi aisi category ki nikalo jo uski current pasand se alag ho
            for (let i = 1; i < promosData.length; i++) {
                let checkIdx = (currentSlideIndex + i) % promosData.length;
                if (!userInterests.has(promosData[checkIdx].category)) {
                    return checkIdx; 
                }
            }
            return (currentSlideIndex + 1) % promosData.length; 
        }

        function activateSlide(index, autoScroll = true) {
            // 1. PURANI SLIDE KA RESULT CHECK KARO
            if (slideStartTime > 0 && promosData[currentSlideIndex]) {
                const outgoingPromo = promosData[currentSlideIndex];
                const watchTime = (Date.now() - slideStartTime) / 1000;
                const vid = document.getElementById(`vid_${currentSlideIndex}`);
                const isUnmuted = vid && !vid.muted;

                if ((watchTime >= 4 || isUnmuted) && outgoingPromo.category) {
                    userInterests.add(outgoingPromo.category);
                    consecutiveSwipes = 0; // Agar dilchaspi li hai toh swipe count bhi zero kar do
                }
            }

            // 2. NAYI SLIDE SET KARO
            currentSlideIndex = index;
            slideStartTime = Date.now(); 
            
            const slider = document.getElementById('promoSlider');
            const dots = document.querySelectorAll('#promoDots div');
            
            if (autoScroll) {
                isAutoScrolling = true;
                slider.scrollLeft = slider.offsetWidth * index;
                setTimeout(() => { isAutoScrolling = false; }, 500); 
            }
            
            dots.forEach((dot, i) => {
                if(i === index) dot.classList.add('dot-active');
                else dot.classList.remove('dot-active');
            });

            // Sab videos band karo
            const allVideos = document.querySelectorAll('.promo-video');
            allVideos.forEach(v => {
                v.pause();
                v.muted = true; 
                v.onended = null; 
                const icon = document.getElementById(`icon_${v.id}`);
                if(icon) icon.className = 'fas fa-volume-mute text-[10px]';
            });

            clearTimeout(slideTimer); 

            const currentPromo = promosData[index];

            // 3. NAYI VIDEO/IMAGE PLAY KARO
            if (currentPromo.promo_type === 'video') {
                const currentVid = document.getElementById(`vid_${index}`);
                if(currentVid) {
                    currentVid.currentTime = 0; 
                    currentVid.play().catch(e => console.log("Autoplay block:", e));
                    
                    currentVid.onended = () => {
                        const nextIdx = getSmartNextIndex();
                        activateSlide(nextIdx, true);
                    };
                }
            } else {
                const delay = (currentPromo.duration || 5) * 1000;
                slideTimer = setTimeout(() => {
                    const nextIdx = getSmartNextIndex();
                    activateSlide(nextIdx, true);
                }, delay);
            }
        }

        function toggleSliderAudio(e, vidId) {
            e.stopPropagation();
            const vid = document.getElementById(vidId);
            const icon = document.getElementById(`icon_${vidId}`);
            if (vid) {
                vid.muted = !vid.muted;
                icon.className = vid.muted ? 'fas fa-volume-mute text-[10px]' : 'fas fa-volume-up text-[10px]';
            }
        }

        setTimeout(fetchPromotions, 600);
    </script>
</body>
</html>
